<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#1a0f3e"/>
      <stop offset="60%" stop-color="#0e0826"/>
      <stop offset="100%" stop-color="#060314"/>
    </radialGradient>

    <!-- Orbital ring gradient -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <!-- Glow filter for stars -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for ring -->
    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Purple under-glow -->
    <radialGradient id="glowBg" cx="50%" cy="62%" r="35%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bgGrad)"/>

  <!-- Purple under-glow -->
  <ellipse cx="128" cy="158" rx="90" ry="50" fill="url(#glowBg)"/>

  <!-- Orbital ring (ellipse, tilted) -->
  <g filter="url(#ringGlow)">
    <ellipse cx="128" cy="118" rx="88" ry="36"
      fill="none"
      stroke="url(#orbitGrad)"
      stroke-width="3.5"
      stroke-linecap="round"
      transform="rotate(-20 128 118)"
      stroke-dasharray="320 60"
      stroke-dashoffset="-20"
    />
  </g>

  <!-- Main bright star (left side of orbit) -->
  <g filter="url(#glow)" transform="rotate(-20 128 118)">
    <circle cx="58" cy="118" r="6" fill="white"/>
    <!-- Star rays -->
    <line x1="58" y1="104" x2="58" y2="100" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="58" y1="132" x2="58" y2="136" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="118" x2="40" y2="118" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="118" x2="76" y2="118" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- Diagonal rays -->
    <line x1="48" y1="108" x2="45" y2="105" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="68" y1="108" x2="71" y2="105" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="48" y1="128" x2="45" y2="131" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="68" y1="128" x2="71" y2="131" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Secondary smaller star (top of orbit) -->
  <g filter="url(#glow)" transform="rotate(-20 128 118)">
    <circle cx="130" cy="82" r="3.5" fill="#93c5fd"/>
    <line x1="130" y1="75" x2="130" y2="72" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="130" y1="89" x2="130" y2="92" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="123" y1="82" x2="120" y2="82" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="137" y1="82" x2="140" y2="82" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Tiny sparkle dots along orbit -->
  <g transform="rotate(-20 128 118)" opacity="0.7">
    <circle cx="92" cy="88" r="1.8" fill="#c4b5fd"/>
    <circle cx="168" cy="92" r="1.4" fill="#93c5fd"/>
    <circle cx="185" cy="110" r="1.2" fill="#a5b4fc"/>
    <circle cx="75" cy="140" r="1.4" fill="#c4b5fd"/>
  </g>

  <!-- ORION text -->
  <text
    x="128" y="198"
    text-anchor="middle"
    font-family="'Arial Rounded MT Bold', 'Nunito', 'Varela Round', sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="4"
    fill="white"
  >ORION</text>

  <!-- Subtle text glow -->
  <text
    x="128" y="198"
    text-anchor="middle"
    font-family="'Arial Rounded MT Bold', 'Nunito', 'Varela Round', sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="4"
    fill="white"
    opacity="0.15"
    filter="url(#glow)"
  >ORION</text>
</svg>
